    <button onclick="cekKode()" style="background-color: #111; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold;">Buka Aplikasi</button>
    
    <p id="pesan-error" style="color: red; display: none; margin-top: 15px; font-size: 14px;">Kode salah, silakan coba lagi.</p>

<script>
  function cekKode() {
    const kodeUser = document.getElementById("input-kode").value;
    
    // GANTI TEKS DI BAWAH INI DENGAN PASSWORD RAHASIAMU
    const kodeRahasia = "THREADS2026"; 

    if (kodeUser === kodeRahasia) {
      // Jika kode benar, hilangkan gembok layar
      document.getElementById("gembok-layar").style.display = "none";
    } else {
      // Jika kode salah, munculkan peringatan
      document.getElementById("pesan-error").style.display = "block";
    }
  }
</script>

    <!-- Area Hasil Generasi (Sembunyi by default) -->

    <script>
        // Kunci API (disediakan oleh environment)
        const apiKey = "";
        
        // State Affiliate Mode
        let isAffiliateMode = true;

        // State Image
        let uploadedImageBase64 = null;
        let uploadedImageMimeType = null;

        // Inisialisasi UI
        document.addEventListener('DOMContentLoaded', () => {
            updateAffiliateUI();
        });

        // Fitur Tab Navigation
        function switchTab(tab) {
            const tabUtas = document.getElementById('tab-utas');
            const tabKomen = document.getElementById('tab-komen');
            const btnUtas = document.getElementById('btn-tab-utas');
            const btnKomen = document.getElementById('btn-tab-komen');
            const resultArea = document.getElementById('resultArea');

            // Sembunyikan hasil sebelumnya saat ganti tab
            resultArea.classList.add('hidden');

            if (tab === 'utas') {
                tabUtas.classList.remove('hidden');
                tabUtas.classList.add('block');
                tabKomen.classList.add('hidden');
                tabKomen.classList.remove('block');
                
                btnUtas.className = "flex-1 pb-3 text-center border-b-2 border-indigo-500 text-indigo-400 font-semibold transition-colors flex justify-center items-center gap-2";
                btnKomen.className = "flex-1 pb-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-400 font-semibold transition-colors flex justify-center items-center gap-2";
            } else {
                tabKomen.classList.remove('hidden');
                tabKomen.classList.add('block');
                tabUtas.classList.add('hidden');
                tabUtas.classList.remove('block');
                
                btnKomen.className = "flex-1 pb-3 text-center border-b-2 border-indigo-500 text-indigo-400 font-semibold transition-colors flex justify-center items-center gap-2";
                btnUtas.className = "flex-1 pb-3 text-center border-b-2 border-transparent text-slate-500 hover:text-slate-400 font-semibold transition-colors flex justify-center items-center gap-2";
            }
        }

        // Toggle Affiliate Mode
        function toggleAffiliate() {
            isAffiliateMode = !isAffiliateMode;
            updateAffiliateUI();
        }

        function updateAffiliateUI() {
            const checkbox = document.getElementById('affiliateCheckbox');
            const icon = document.getElementById('affiliateCheckIcon');
            const inputs = document.getElementById('affiliateInputs');
            const box = document.getElementById('affiliateBox');

            if (isAffiliateMode) {
                checkbox.classList.add('bg-indigo-500', 'border-indigo-500');
                checkbox.classList.remove('border-slate-500');
                icon.classList.remove('hidden');
                inputs.style.display = 'block';
                box.classList.add('border-indigo-500/50');
            } else {
                checkbox.classList.remove('bg-indigo-500', 'border-indigo-500');
                checkbox.classList.add('border-slate-500');
                icon.classList.add('hidden');
                inputs.style.display = 'none';
                box.classList.remove('border-indigo-500/50');
            }
        }

        // Set Topik Cepat
        function setTopic(text) {
            const topicInput = document.getElementById('topicInput');
            topicInput.value = text;
            
            // Matikan mode affiliate otomatis untuk fokus ke konten organik
            if (isAffiliateMode) {
                toggleAffiliate();
                showToast('Affiliate Mode dimatikan untuk konten organik');
            }
            
            // Efek visual highlight
            topicInput.classList.add('border-indigo-500', 'ring-1', 'ring-indigo-500');
            setTimeout(() => {
                topicInput.classList.remove('border-indigo-500', 'ring-1', 'ring-indigo-500');
            }, 500);
        }

        // Fitur Image Upload
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validasi ukuran (maks 5MB)
            if (file.size > 5 * 1024 * 1024) {
                showToast('Ukuran gambar maksimal 5MB', true);
                event.target.value = '';
                return;
            }

            uploadedImageMimeType = file.type;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                uploadedImageBase64 = e.target.result;
                
                // Tampilkan preview
                document.getElementById('uploadPlaceholder').classList.add('hidden');
                document.getElementById('imagePreview').src = uploadedImageBase64;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('removeImageBtn').classList.remove('hidden');
                document.getElementById('dropzone').classList.remove('border-dashed');
                document.getElementById('dropzone').classList.add('border-indigo-500');
            };
            
            reader.readAsDataURL(file);
        }

        function removeImage(event) {
            event.preventDefault(); // Mencegah trigger label (buka file explorer lagi)
            event.stopPropagation();
            
            uploadedImageBase64 = null;
            uploadedImageMimeType = null;
            document.getElementById('imageUpload').value = '';
            
            // Kembalikan ke tampilan awal
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('imagePreview').src = '';
            document.getElementById('removeImageBtn').classList.add('hidden');
            document.getElementById('dropzone').classList.add('border-dashed');
            document.getElementById('dropzone').classList.remove('border-indigo-500');
        }

        // Tampilkan Toast Notifikasi
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            
            toastMsg.textContent = message;
            
            if (isError) {
                toast.classList.replace('bg-emerald-600', 'bg-red-600');
                toast.querySelector('i').classList.replace('fa-circle-check', 'fa-circle-exclamation');
            } else {
                toast.classList.replace('bg-red-600', 'bg-emerald-600');
                toast.querySelector('i').classList.replace('fa-circle-exclamation', 'fa-circle-check');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Fungsi Salin Teks
        function copyText(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Utas berhasil disalin!');
            } catch (err) {
                showToast('Gagal menyalin teks', true);
            }
            document.body.removeChild(textarea);
        }

        // Salin Semua Utas
        function copyAll() {
            const threadCards = document.querySelectorAll('.thread-content');
            let fullText = '';
            threadCards.forEach((card, index) => {
                fullText += card.innerText + '\n\n';
            });
            copyText(fullText.trim());
        }

        // Fungsi Memanggil Gemini API
        async function callGeminiAPI(prompt, base64Img = null, mimeType = null) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            // Susun muatan (payload) yang bisa menerima teks dan gambar sekaligus
            const parts = [{ text: prompt }];
            if (base64Img && mimeType) {
                parts.push({
                    inlineData: {
                        mimeType: mimeType,
                        data: base64Img.split(',')[1] // Buang awalan data:image/...
                    }
                });
            }

            const payload = {
                contents: [{ parts: parts }],
                systemInstruction: { 
                    parts: [{ 
                        text: "Kamu adalah asisten social media expert dan spesialis Affiliate Marketing. Tugasmu adalah membuat draf konten 'Threads' yang natural, engaging, dan tidak kaku. Pisahkan setiap post (utas) dengan pembatas '|||'. Jangan gunakan bahasa yang terlalu robotik. Gunakan emoji secukupnya." 
                    }] 
                }
            };

            // Implementasi Exponential Backoff
            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                    
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // Proses Utama: Generate Thread
        async function generateThread() {
            const topic = document.getElementById('topicInput').value.trim();
            const style = document.getElementById('threadStyle').options[document.getElementById('threadStyle').selectedIndex].text;
            const lengthSelect = document.getElementById('threadLength');
            const lengthVal = lengthSelect.value;
            const length = lengthSelect.options[lengthSelect.selectedIndex].text;
            const language = document.getElementById('threadLanguage').value;
            
            // Validasi: Topik ATAU Gambar ATAU Affiliate Mode harus ada
            if (!topic && !uploadedImageBase64 && !isAffiliateMode) {
                showToast('Harap masukkan teks topik, unggah foto, atau isi nama produk!', true);
                document.getElementById('topicInput').focus();
                return;
            }

            let prodNameStr = "";

                const platform = document.getElementById('affiliatePlatform').value;
                const prodName = document.getElementById('productName').value.trim();
                const prodLink = document.getElementById('productLink').value.trim();
                
                if (!prodName || !prodLink) {
                    showToast('Harap isi Nama dan Link Produk yang ingin dipromosikan!', true);
                    return;
                }
                prodNameStr = prodName;
                
                let platformContext = platform === 'Lainnya' ? 'sebuah produk/layanan umum' : `produk affiliate ${platform}`;
                
                affiliatePrompt = `\n\n[INSTRUKSI PROMOSI - SANGAT PENTING]\nSaya sedang mempromosikan ${platformContext}. Kamu WAJIB menggunakan teknik SOFT-SELLING tingkat tinggi.\n- JANGAN kentara kalau ini postingan jualan/iklan.\n- Buat awalan utas berupa cerita, tips, opini, atau keluhan sehari-hari yang sangat "relatable" dengan target audiens.\n- Sisipkan produk "${prodName}" BUKAN sebagai bahan promosi langsung, tapi sebagai "rekomendasi jujur" atau "penemuan dari pengalaman pribadi" di pertengahan atau akhir utas.\n- Arahkan pembaca untuk mengecek produknya melalui tautan ini dengan bahasa yang sangat santai: "${prodLink}".`;
            }

            // Menyusun Prompt
            let prompt = "";
            if (uploadedImageBase64) {
                prompt += `Tolong perhatikan foto/gambar yang saya lampirkan. Buatkan draf konten untuk platform Threads berdasarkan gambar tersebut.\n`;
                if (topic) prompt += `Arahan tambahan/fokus spesifik dari saya: ${topic}\n`;
            } else if (topic) {
                prompt += `Buatkan draf konten untuk platform Threads berdasarkan detail berikut:\nTopik: ${topic}\n`;
            } else if (isAffiliateMode) {
                prompt += `Buatkan draf konten (berupa cerita, opini, atau tips) untuk platform Threads yang mengalir natural, namun pada akhirnya menyinggung produk: ${prodNameStr}.\n`;
            }

            const langInstruction = language === 'en' 
                ? "TULIS SELURUH UTAS DALAM BAHASA INGGRIS (ENGLISH) yang natural seperti native speaker." 
                : "TULIS SELURUH UTAS DALAM BAHASA INDONESIA yang gaul/natural sesuai gaya bahasa.";

            let interactivePrompt = "";
            if (document.getElementById('threadStyle').value === 'interaktif') {
                interactivePrompt = "\n[INSTRUKSI INTERAKTIF]\nWAJIB akhiri utas dengan pertanyaan terbuka yang kuat untuk memancing audiens membalas/berkomentar di kolom komentar (Call to Action untuk diskusi).";
            }

            prompt += `
Gaya Bahasa: ${style}
Panjang Utas: ${length} ${lengthVal === 'satu_utas' ? '(WAJIB: HANYA BUAT 1 POSTINGAN TUNGGAL SAJA. JANGAN DIBAGI MENJADI BEBERAPA UTAS)' : ''}
Instruksi Bahasa: ${langInstruction}
${affiliatePrompt}
${interactivePrompt}

Aturan format penting:
1. PISAHKAN setiap bagian utas dengan simbol '|||' (tiga garis vertikal). Jangan gunakan angka penomoran biasa, cukup pisahkan dengan '|||'.
2. Utas pertama harus sangat *hooking* (menarik perhatian).
3. Buat pembacaan mengalir seolah-olah ditulis oleh manusia asli, bukan bot.
4. [SANGAT KRITIS] BATAS KARAKTER: Setiap bagian utas (yang dipisahkan '|||') MAKSIMAL HARUS 450 KARAKTER. Dilarang keras melebihi 500 karakter per bagian karena batas sistem Threads!
`;

            // UI Loading State
            const btn = document.getElementById('generateBtn');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnIcon.className = "fa-solid fa-spinner fa-spin loading-sparkle";
            btnText.textContent = "Menyusun Utas Ajaib...";
            
            document.getElementById('resultArea').classList.add('hidden');
            const container = document.getElementById('threadContainer');
            container.innerHTML = '';
            
            // Set judul hasil ke mode utas
            document.querySelector('#resultArea h3 span').innerHTML = '<i class="fa-brands fa-threads text-white mr-2"></i> Hasil Utas Kamu';

            try {
                // Panggil API
                const resultText = await callGeminiAPI(prompt, uploadedImageBase64, uploadedImageMimeType);
                
                // Parsing hasil (memisahkan berdasarkan '|||')
                const threads = resultText.split('|||')
                                          .map(t => t.trim())
                                          .filter(t => t.length > 0);

                if (threads.length === 0) throw new Error("Format balasan AI tidak sesuai.");

                // Render ke layar
                threads.forEach((threadText, index) => {
                    // Membersihkan potensi markdown tebal (**) jika berlebihan
                    const cleanText = threadText.replace(/^\d+[\.\/]\d*\s*/, '').trim(); // Hapus jika ada nomor di awal
                    const charCount = cleanText.length;
                    const countColorClass = charCount > 500 ? 'text-red-400 font-bold' : 'text-slate-500';
                    
                    const card = document.createElement('div');
                    card.className = "bg-[#1e293b] p-5 rounded-2xl border border-[#334155] shadow-md relative group hover:border-indigo-500/50 transition-colors";
                    
                    card.innerHTML = `
                        <div class="flex items-start gap-4">
                            <div class="min-w-[40px] h-[40px] rounded-full bg-[#0f172a] border border-[#334155] flex items-center justify-center font-bold text-slate-400">
                                ${index + 1}
                            </div>
                            <div class="w-full">
                                <p class="text-slate-200 whitespace-pre-wrap thread-content leading-relaxed">${cleanText}</p>
                                <div class="mt-4 flex justify-between items-center opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                                    <span class="text-xs ${countColorClass}"><i class="fa-solid fa-text-width mr-1"></i> ${charCount}/500</span>
                                    <button onclick="copyText(this.parentElement.previousElementSibling.innerText)" class="bg-[#334155] hover:bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                                        <i class="fa-regular fa-copy"></i> Salin
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Tampilkan area hasil
                document.getElementById('resultArea').classList.remove('hidden');
                
                // Scroll perlahan ke hasil
                document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error(error);
                showToast('Gagal membuat utas. Silakan coba lagi.', true);
            } finally {
                // Kembalikan tombol ke semula
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                btnIcon.className = "fa-solid fa-wand-magic-sparkles";
                btnText.textContent = "Buat Utas Sekarang";
            }
        }
